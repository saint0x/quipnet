services:
  quipd:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: quipd:dev
    environment:
      QUIP_NETWORK: personalcloud-prod
      QUIP_STATE_PATH: /home/quip/.quip/net/state.json
      QUIP_IDENTITY_PATH: /home/quip/.quip/identity/node.json
      QUIP_IDENTITY_PASSPHRASE_ENV: QUIP_IDENTITY_PASSPHRASE
      QUIP_IDENTITY_PASSPHRASE: change-me-for-dev
      QUIP_AUTHORITY_ORIGIN: http://authority:8080
      QUIP_SYNC: "true"
      QUIP_REVOCATION_SYNC: "true"
    ports:
      - "4433:4433/udp"
    volumes:
      - quip-data:/home/quip/.quip
    healthcheck:
      test: ["CMD", "/usr/local/bin/quip", "--network", "personalcloud-prod", "--state-path", "/home/quip/.quip/net/state.json", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles: ["dev"]

  relay:
    image: quipd:dev
    entrypoint: ["/usr/local/bin/relay"]
    command: ["--region", "local", "--max-bandwidth-mbps", "9000"]
    depends_on:
      quipd:
        condition: service_healthy
    ports:
      - "5443:4433/udp"
    restart: unless-stopped

volumes:
  quip-data:
