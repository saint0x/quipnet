services:
  quicnetd:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: quicnetd:dev
    environment:
      QUICNET_NETWORK: personalcloud-prod
      QUICNET_STATE_PATH: /var/lib/quicnet/state.json
      QUICNET_IDENTITY_PATH: /var/lib/quicnet/identity.json
      QUICNET_IDENTITY_PASSPHRASE_ENV: QUICNET_IDENTITY_PASSPHRASE
      QUICNET_IDENTITY_PASSPHRASE: change-me-for-dev
      QUICNET_AUTHORITY_ORIGIN: http://authority:8080
      QUICNET_SYNC: "true"
      QUICNET_REVOCATION_SYNC: "true"
    ports:
      - "4433:4433/udp"
    volumes:
      - quicnet-data:/var/lib/quicnet
    healthcheck:
      test: ["CMD", "/usr/local/bin/quicnet", "--network", "personalcloud-prod", "--state-path", "/var/lib/quicnet/state.json", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles: ["dev"]

  relay:
    image: quicnetd:dev
    entrypoint: ["/usr/local/bin/relay"]
    command: ["--region", "local", "--max-bandwidth-mbps", "9000"]
    depends_on:
      quicnetd:
        condition: service_healthy
    ports:
      - "5443:4433/udp"
    restart: unless-stopped

volumes:
  quicnet-data:
