apiVersion: v1
kind: ConfigMap
metadata:
  name: quip-config
  namespace: quip-system
data:
  QUIP_NETWORK: personalcloud-prod
  QUIP_STATE_PATH: /home/quip/.quip/net/state.json
  QUIP_IDENTITY_PATH: /home/quip/.quip/identity/node.json
  QUIP_IDENTITY_PASSPHRASE_ENV: QUIP_IDENTITY_PASSPHRASE
  QUIP_AUTHORITY_ORIGIN: https://authority.quip.example
  QUIP_AUTHORITY_SUBJECT: ""
  QUIP_SYNC: "true"
  QUIP_REVOCATION_SYNC: "true"
