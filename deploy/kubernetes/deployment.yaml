apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicnetd
  namespace: quicnet-system
  labels:
    app.kubernetes.io/name: quicnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quicnet
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quicnet
    spec:
      serviceAccountName: default
      containers:
        - name: quicnetd
          image: quicnetd:dev
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -- --network "$QUICNET_NETWORK" --state-path "$QUICNET_STATE_PATH" --identity-path "$QUICNET_IDENTITY_PATH" --identity-passphrase-env "$QUICNET_IDENTITY_PASSPHRASE_ENV"
              if [ "$QUICNET_SYNC" = "true" ]; then
                set -- "$@" --sync
              fi
              if [ "$QUICNET_REVOCATION_SYNC" = "true" ]; then
                set -- "$@" --revocation-sync
              fi
              if [ -n "${QUICNET_AUTHORITY_ORIGIN:-}" ]; then
                set -- "$@" --authority-origin "$QUICNET_AUTHORITY_ORIGIN"
              fi
              if [ -n "${QUICNET_AUTHORITY_SUBJECT:-}" ]; then
                set -- "$@" --authority-subject "$QUICNET_AUTHORITY_SUBJECT"
              fi
              if [ -n "${QUICNET_AUTHORITY_SNAPSHOT:-}" ]; then
                set -- "$@" --authority-snapshot "$QUICNET_AUTHORITY_SNAPSHOT"
              fi
              exec /usr/local/bin/quicnetd "$@"
          envFrom:
            - configMapRef:
                name: quicnet-config
            - secretRef:
                name: quicnet-secrets
          ports:
            - name: quic-udp
              containerPort: 4433
              protocol: UDP
          volumeMounts:
            - name: state
              mountPath: /home/quicnet/.quip/quicnet
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - exec /usr/local/bin/quicnet --network "$QUICNET_NETWORK" --state-path "$QUICNET_STATE_PATH" status >/dev/null
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
            readOnlyRootFilesystem: true
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: quicnet-state
