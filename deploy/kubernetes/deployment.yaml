apiVersion: apps/v1
kind: Deployment
metadata:
  name: quipd
  namespace: quip-system
  labels:
    app.kubernetes.io/name: quip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quip
    spec:
      containers:
        - name: quipd
          image: quipd:dev
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -- --network "$QUIP_NETWORK" --state-path "$QUIP_STATE_PATH" --identity-path "$QUIP_IDENTITY_PATH" --identity-passphrase-env "$QUIP_IDENTITY_PASSPHRASE_ENV"
              if [ "${QUIP_SYNC}" = "true" ]; then set -- "$@" --sync; fi
              if [ "${QUIP_REVOCATION_SYNC}" = "true" ]; then set -- "$@" --revocation-sync; fi
              if [ -n "${QUIP_AUTHORITY_ORIGIN:-}" ]; then set -- "$@" --authority-origin "$QUIP_AUTHORITY_ORIGIN"; fi
              if [ -n "${QUIP_AUTHORITY_SUBJECT:-}" ]; then set -- "$@" --authority-subject "$QUIP_AUTHORITY_SUBJECT"; fi
              if [ -n "${QUIP_AUTHORITY_SNAPSHOT:-}" ]; then set -- "$@" --authority-snapshot "$QUIP_AUTHORITY_SNAPSHOT"; fi
              exec /usr/local/bin/quipd "$@"
          envFrom:
            - configMapRef:
                name: quip-config
            - secretRef:
                name: quip-secrets
          ports:
            - containerPort: 4433
              protocol: UDP
          volumeMounts:
            - name: quip-state
              mountPath: /home/quip/.quip
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - /usr/local/bin/quip --network "$QUIP_NETWORK" --state-path "$QUIP_STATE_PATH" status
      volumes:
        - name: quip-state
          persistentVolumeClaim:
            claimName: quip-state
