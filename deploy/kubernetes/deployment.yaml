apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicnetd
  namespace: quicnet-system
  labels:
    app.kubernetes.io/name: quicnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quicnet
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quicnet
    spec:
      serviceAccountName: default
      containers:
        - name: quicnetd
          image: quicnetd:dev
          imagePullPolicy: IfNotPresent
          args:
            - --network
            - $(QUICNET_NETWORK)
            - --state-path
            - $(QUICNET_STATE_PATH)
          envFrom:
            - configMapRef:
                name: quicnet-config
          ports:
            - name: quic-udp
              containerPort: 4433
              protocol: UDP
          volumeMounts:
            - name: state
              mountPath: /var/lib/quicnet
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - exec /usr/local/bin/quicnet --network "$QUICNET_NETWORK" --state-path "$QUICNET_STATE_PATH" status >/dev/null
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
            readOnlyRootFilesystem: true
      volumes:
        - name: state
          emptyDir: {}
